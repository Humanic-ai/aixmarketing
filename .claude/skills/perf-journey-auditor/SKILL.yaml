name: perf-journey-auditor
version: "1.0.0"
disable_model_invocation: false

description:
  short: >
    Audits email journey performance: sends, open/click rates, daily metrics,
    and drop-off analysis. Pulls data from the warehouse or ESP and produces
    a structured performance report with actionable recommendations.
  trigger_phrases:
    - "audit this journey"
    - "journey performance"
    - "email metrics"
    - "how is my journey doing"
    - "send performance"
    - "open rates for journey"
    - "journey audit"
    - "campaign performance report"
  when_to_use: >
    Use this skill when the user wants a performance review of an email
    journey or campaign. It structures raw metrics into an audit with
    benchmarks, drop-off analysis, and specific recommendations.

instructions:
  - step: 1
    name: "Collect Performance Data"
    content: |
      Ask the user to provide metrics in any format:
      - Paste from ESP dashboard (SFMC, Customer.io, Klaviyo, Humanic)
      - CSV export
      - Verbal summary ("Email 1 got 35% open rate, Email 2 got 22%")
      - API data (if ESP MCP is connected)

      Required metrics per email:
      - Sends / Delivered / Bounced
      - Opens (unique) / Open rate
      - Clicks (unique) / Click rate
      - Unsubscribes
      - Conversions (if tracked)

  - step: 2
    name: "Benchmark Comparison"
    benchmarks:
      welcome:
        open_rate: "50-60%"
        click_rate: "15-25%"
        unsubscribe_rate: "<0.5%"
      promotional:
        open_rate: "15-25%"
        click_rate: "2-5%"
        unsubscribe_rate: "<0.3%"
      transactional:
        open_rate: "60-80%"
        click_rate: "10-20%"
        unsubscribe_rate: "<0.1%"
      re_engagement:
        open_rate: "10-20%"
        click_rate: "1-3%"
        unsubscribe_rate: "<1%"
      cart_recovery:
        open_rate: "40-50%"
        click_rate: "10-15%"
        unsubscribe_rate: "<0.2%"

  - step: 3
    name: "Generate the Audit Report"
    output_format: |
      JOURNEY AUDIT REPORT
      ════════════════════

      JOURNEY: [name]
      PERIOD: [date range]
      TOTAL CONTACTS: [N entered]

      PER-EMAIL PERFORMANCE:
      | Email | Sent | Delivered | Opens | Open% | Clicks | CTR% | Unsubs | Unsub% |
      |-------|------|-----------|-------|-------|--------|------|--------|--------|
      | [1]   | [N]  | [N]      | [N]   | [%]   | [N]    | [%]  | [N]    | [%]    |

      vs. BENCHMARKS:
      | Email | Open% vs Bench | CTR% vs Bench | Verdict |
      |-------|---------------|---------------|---------|
      | [1]   | [above/below] | [above/below] | [strong/ok/weak] |

      DROP-OFF ANALYSIS:
      - Entry → Email 1: [%] reached
      - Email 1 → Email 2: [%] drop-off — [normal/high — explanation]
      - Email 2 → Email 3: [%] drop-off — [normal/high — explanation]

      TOP ISSUES (ranked by impact):
      1. [Highest impact issue + specific fix]
      2. [Second issue + fix]
      3. [Third issue + fix]

      RECOMMENDATIONS:
      - Subject line: [if open rate is weak — specific test to run]
      - Content: [if CTR is weak — what to change in the body]
      - Timing: [if drop-off is high — wait step adjustment]
      - Segmentation: [if unsubs are high — audience quality issue]

      NEXT AUDIT: [recommended date for re-check]

rules:
  - "Always compare against benchmarks for the email type — raw numbers alone are meaningless"
  - "Drop-off between emails is expected — flag only abnormal drops (>50% for welcome, >70% for promo)"
  - "Recommendations must be specific and actionable — 'improve subject lines' is not actionable"
  - "If data is incomplete, note what's missing and what conclusions can't be drawn"
  - "Distinguish between unique and total opens/clicks — SFMC reports both"
