mcp_tools_used:
  - mcp__humanic__list_campaigns
  - mcp__humanic__create_campaign
  - mcp__humanic__get_campaign
  - mcp__humanic__update_step_content
  - mcp__humanic__activate_campaign
  - mcp__humanic__get_campaign_analytics
  - mcp__humanic__list_cohorts
  - mcp__humanic__get_cohort

rules:
  - "Always check for .humanic-onboarding-state.json before starting — never re-create campaigns that already exist"
  - "Never proceed to campaign creation until all 4 cohort IDs are confirmed by the user"
  - "Always generate all 4 emails before making any MCP calls — batch the content work first"
  - "The tag names (onboarding_step_1 through onboarding_step_4) must be exact — they are the glue between PostHog and Humanic"
  - "If a campaign activation fails, report the error and stop — do not retry blindly"
  - "After full setup, always output the PostHog webhook instructions — the funnel is inert without them"
  - "Offer to run /humanic-optimize on any stage that has >100 sends and <20% open rate"
  - "If the user asks to add a Stage 5 (e.g., upsell after first campaign activated), extend the state schema and create a new cohort + campaign"
  - "Cohort creation via MCP returns 422 on the Humanic preprod API — always guide through manual UI creation"
  - "Write state file after every MCP write operation so progress is never lost"

email_content_guidelines:
  stage_1:
    max_words: 150
    cta_style: "curiosity — show the product doing the work"
    avoid: "generic onboarding language, feature lists, company mission statements"
    must_include: "a specific 'you can do this in 30 seconds' type framing"
  stage_2:
    max_words: 100
    cta_style: "momentum — they already did the hard part"
    avoid: "reintroducing the product, repeating Stage 1 content"
    must_include: "reference to the prompt they already submitted"
  stage_3:
    max_words: 100
    cta_style: "simplicity — make the CSV upload feel trivial"
    avoid: "technical language, format requirements upfront"
    must_include: "their email is waiting — just needs an audience"
  stage_4:
    max_words: 120
    cta_style: "launch moment — make activation feel like a milestone"
    avoid: "last-minute doubt-raising, excessive caveats"
    must_include: "a sense of completion and forward momentum"
